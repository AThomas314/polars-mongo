[build-system]
requires = ["maturin>=1.5,<2.0"]
build-backend = "maturin"

[project]
name = "polars-mongo"
version = "0.1.0"
description = "Connector to read polars dataframes from mongodb collections with full projection pushdown, including nested fields"
requires-python = ">=3.8"
dependencies = [
    "polars>=0.38.0"
]
classifiers = [
    "Programming Language :: Rust",
    "Programming Language :: Python :: Implementation :: CPython",
]
